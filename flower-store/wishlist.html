<!DOCTYPE html>
<html>
<head>
  <title>Wishlist</title>
<link rel="stylesheet" href="./css/style.css">
<script src="./js/script.js"></script>
</head>

<body>

<h1 style="text-align:center;">❤️ Wishlist</h1>

<div id="wishlist-items"></div>

<script>

let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let container = document.getElementById("wishlist-items");

if(wishlist.length === 0){
  container.innerHTML = "<h2 style='text-align:center;'>Wishlist empty 😢</h2>";
}

wishlist.forEach(item => {

  container.innerHTML += `
    <div style="display:flex; gap:20px; margin:20px; border:1px solid #ccc; padding:10px;">
      
      <img src="${item.image}" width="100">

      <div>
        <h3>${item.name}</h3>
        <p>₹${item.price}</p>

        <button onclick="addToCartFromWishlist(${item.id})">
          Add To Cart 🛒
        </button>

        <button onclick="removeItem(${item.id})">
          Remove ❌
        </button>
      </div>

    </div>
  `;
});

function removeItem(id){
  wishlist = wishlist.filter(item => item.id != id);
  localStorage.setItem("wishlist", JSON.stringify(wishlist));
  location.reload();
}

function addToCartFromWishlist(id){

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let product = wishlist.find(item => item.id == id);

  const existing = cart.find(item => item.id == product.id);

  if(existing){
    existing.quantity++;
  } else {
    cart.push({...product, quantity:1});
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Moved to cart 🛒");
}

</script>

</body>
</html>
