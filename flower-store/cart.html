<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Cart</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <h1 style="text-align:center;">🛒 Your Cart</h1>

  <div id="cart-items" style="padding:20px;"></div>

  <h2 style="text-align:center;">
    Total: ₹<span id="total-price">0</span>
  </h2>
  <div style="text-align:center; margin:20px;">
    <a href="checkout.html">
      <button style="padding:10px 20px; background:#fb6f92; color:white; border:none;">
        Proceed to Checkout
      </button>
    </a>
  </div>

  <a href="index.html" style="display:block; text-align:center; margin:20px;">
    ⬅ Back To Shop
  </a>

  <script>
    <!-- ✅ JAVASCRIPT YAHAN LIKHNA HAI (BODY KE END ME) -->
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let container = document.getElementById("cart-items");
    let total = 0;

    // EMPTY
    if (cart.length === 0) {
      container.innerHTML = "<h2 style='text-align:center;'>Cart is empty 😢</h2>";
    }

    // SHOW ITEMS
    cart.forEach(item => {

      total += item.price * item.quantity;

      container.innerHTML += `
  <div style="display:flex; gap:20px; margin:20px; border:1px solid #ccc; padding:10px;">

    <img src="${item.image}" width="100">

    <div>
      <h3>${item.name}</h3>
      <p>Price: ₹${item.price}</p>

      <p>
        Quantity:
        <button class="decrease" data-id="${item.id}">-</button>
        ${item.quantity}
        <button class="increase" data-id="${item.id}">+</button>
      </p>

      <p>Total: ₹${item.price * item.quantity}</p>

      <button class="remove-btn" data-id="${item.id}">Remove</button>
    </div>

  </div>
  `;
    });

    // TOTAL
    document.getElementById("total-price").innerText = total;


    // 🔥 ALL BUTTON EVENTS
    document.addEventListener("click", function (e) {

      let cart = JSON.parse(localStorage.getItem("cart")) || [];

      // REMOVE
      if (e.target.classList.contains("remove-btn")) {
        let id = e.target.dataset.id;
        cart = cart.filter(item => item.id != id);
      }

      // INCREASE
      if (e.target.classList.contains("increase")) {
        let id = e.target.dataset.id;
        cart.forEach(item => {
          if (item.id == id) item.quantity++;
        });
      }

      // DECREASE
      if (e.target.classList.contains("decrease")) {
        let id = e.target.dataset.id;
        cart.forEach(item => {
          if (item.id == id && item.quantity > 1) {
            item.quantity--;
          }
        });
      }

      localStorage.setItem("cart", JSON.stringify(cart));
      location.reload();
    });

  </script>
</body>

</html>
