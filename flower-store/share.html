<!DOCTYPE html>
<html>
<head>
  <title>Share List</title>
<link rel="stylesheet" href="CSS/style.css">
<script src="JS/script.js"></script>
</head>

<body>

<h1 style="text-align:center;">🔗 Share List</h1>

<div id="share-items"></div>

<script>

let share = JSON.parse(localStorage.getItem("share")) || [];
let container = document.getElementById("share-items");

share.forEach(item => {

  container.innerHTML += `
    <div style="display:flex; gap:20px; margin:20px; border:1px solid #ccc; padding:10px;">
      
      <img src="${item.image}" width="100">

      <div>
        <h3>${item.name}</h3>
        <p>₹${item.price}</p>

        <button onclick="shareNow('${item.name}')">
          Share Now 📤
        </button>
      </div>

    </div>
  `;
});

function shareNow(name){
  alert("Sharing " + name);
}

</script>

</body>
</html>
